spring.application.name=schedule-manager-api

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:file:./data/schedule-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

spring.sql.init.mode=always

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

mybatis.configuration.map-underscore-to-camel-case=true

spring.thymeleaf.cache=false
server.error.include-message=always
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Mail (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Reminder mail
app.mail.from=${MAIL_FROM:${spring.mail.username:}}
app.reminder.enabled=true
app.reminder.cron=0 0 9 * * *
app.reminder.zone=Asia/Tokyo
app.gamification.zone=Asia/Tokyo

# Web Push (VAPID)
app.push.vapid.public-key=${VAPID_PUBLIC_KEY:}
app.push.vapid.private-key=${VAPID_PRIVATE_KEY:}
app.push.vapid.subject=${VAPID_SUBJECT:mailto:admin@example.com}
