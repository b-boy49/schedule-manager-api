<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザー編集 | ゲーム予定</title>
    <link rel="stylesheet" href="/css/calendar.css">
</head>
<body th:style="${labelColorStyle}">
<header class="page-hero">
    <h1 th:text="${currentDisplayName + 'のプロフィール'}"></h1>
    <nav class="hero-nav" aria-label="メインメニュー">
        <a href="/calendar">トップ</a>
        <a href="/board">募集掲示板</a>
        <a href="/friends">フレンド</a>
        <a href="/profile">ユーザー編集</a>
        <a href="/dm">✉ DM</a>
        <a href="#profileSection">プロフィール</a>
    </nav>
</header>
<form method="post" action="/logout" class="logout-floating">
    <button type="submit">ログアウト</button>
</form>

<main class="app-shell friends-shell" th:attr="data-current-username=${currentUsername},data-current-display-name=${currentDisplayName}">
    <section id="profileSection" class="schedule-pane">
        <header>
            <h2>ユーザー編集</h2>
        </header>

        <section class="friend-section profile-layout">
            <div class="profile-preview">
                <img id="profileImagePreview" class="profile-image" alt="プロフィール画像プレビュー">
                <p id="profilePreviewName" class="profile-preview-name"></p>
                <p id="profilePreviewBio" class="profile-preview-bio"></p>
            </div>

            <form id="profileForm" class="schedule-form">
                <label for="profileDisplayName">表示名</label>
                <input id="profileDisplayName" type="text" maxlength="100" required>

                <label for="profileEmail">通知用メールアドレス</label>
                <input id="profileEmail" type="email" maxlength="254" placeholder="example@gmail.com">
                <p class="help-text">このメールアドレスは通知用途のみで、他のフレンドユーザーには公開されません。</p>

                <label for="profileImageFile">アイコン画像を変更</label>
                <input id="profileImageFile" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
                <p class="help-text">PNG/JPEG/WEBP/GIF（5MBまで）</p>

                <label class="inline-check">
                    <input id="removeProfileImage" type="checkbox">
                    現在の画像を削除する
                </label>

                <label for="profileIconColor">人物アイコンの色（画像未設定時）</label>
                <input id="profileIconColor" type="color" value="#BFD6FF">

                <label for="profileBio">自己紹介</label>
                <textarea id="profileBio" rows="5" maxlength="500" placeholder="好きなゲーム、プレイ時間帯など"></textarea>

                <label for="profileXUrl">X URL</label>
                <input id="profileXUrl" type="url" maxlength="1000" placeholder="https://x.com/your_account">

                <label for="profileStreamUrl">配信先URL</label>
                <input id="profileStreamUrl" type="url" maxlength="1000" placeholder="https://www.youtube.com/@your_channel">

                <p id="profileMessage" class="form-message" aria-live="polite"></p>

                <div class="form-actions">
                    <button type="submit" class="primary">保存</button>
                </div>
            </form>
        </section>

        <section class="friend-section">
            <h3>ラベル色カスタマイズ</h3>
            <form id="labelColorForm" class="schedule-form">
                <label for="labelTextColor">ラベル本文の色</label>
                <input id="labelTextColor" type="color" value="#2B4E93">
                <div class="form-actions">
                    <button id="resetLabelTextColorButton" type="button" class="secondary">本文色を初期化</button>
                </div>
                <label for="labelHeadingColor">ラベル見出しの色</label>
                <input id="labelHeadingColor" type="color" value="#7D35D8">
                <div class="form-actions">
                    <button id="resetLabelHeadingColorButton" type="button" class="secondary">見出し色を初期化</button>
                </div>
                <label for="labelMutedColor">ラベル補助色</label>
                <input id="labelMutedColor" type="color" value="#445A86">
                <div class="form-actions">
                    <button id="resetLabelMutedColorButton" type="button" class="secondary">補助色を初期化</button>
                </div>
                <div class="form-actions">
                    <button id="resetAllLabelColorsButton" type="button" class="secondary">すべて初期化</button>
                </div>
            </form>
        </section>

        <section class="friend-section">
            <h3>レベル & ポイント</h3>
            <p id="profileLevelText" class="success-text"></p>
            <p id="profilePointText" class="help-text"></p>
            <div class="level-progress-track">
                <div id="profileLevelProgressBar" class="level-progress-bar"></div>
            </div>
            <p id="profileLevelNextText" class="help-text"></p>
        </section>

        <section class="friend-section">
            <h3>ポイント履歴</h3>
            <ul id="pointHistoryList" class="mini-list"></ul>
        </section>
    </section>
</main>
<script src="/js/theme.js"></script>
<script src="/js/profile.js"></script>
</body>
</html>
