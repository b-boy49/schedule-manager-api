<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>募集掲示板 | ゲーム予定</title>
    <link rel="stylesheet" href="/css/calendar.css">
</head>
<body th:style="${labelColorStyle}">
<header class="page-hero">
    <h1 th:text="${currentDisplayName + 'の募集掲示板'}"></h1>
    <nav class="hero-nav" aria-label="メインメニュー">
        <a href="/calendar">トップ</a>
        <a href="/board">募集掲示板</a>
        <a href="/friends">フレンド</a>
        <a href="/profile">ユーザー編集</a>
        <a href="/dm">✉ DM</a>
    </nav>
</header>

<main class="app-shell friends-shell"
      th:attr="data-current-username=${currentUsername},data-current-display-name=${currentDisplayName},data-search-keyword=${keyword}">
    <section class="schedule-pane">
        <header>
            <h2>ゲーム募集掲示板</h2>
            <form method="post" action="/logout">
                <button type="submit" class="secondary">ログアウト</button>
            </form>
        </header>

        <section class="friend-section">
            <h3>新しいゲームスレッドを作成</h3>
            <form id="threadForm" class="inline-form">
                <input id="threadGameTitle" type="text" maxlength="200" placeholder="例: モンハンワイルズ" required>
                <button type="submit" class="primary">スレッド作成</button>
            </form>
            <p id="boardMessage" class="form-message" aria-live="polite"></p>
        </section>

        <section class="friend-section">
            <h3>スレッド一覧</h3>
            <form method="get" action="/board" class="inline-form" style="margin-bottom:10px;">
                <input type="text" name="keyword" placeholder="タイトルで検索" th:value="${keyword}">
                <button type="submit" class="secondary">検索</button>
                <a href="/board" class="secondary auth-link-button" style="width:auto;min-width:84px;margin-top:0;">クリア</a>
            </form>
            <p class="help-text" th:text="'検索結果: ' + ${threadSearchResultCount} + '件'"></p>
            <ul id="threadList" class="mini-list">
                <li th:if="${#lists.isEmpty(threads)}">スレッドはありません。</li>
                <li th:each="thread : ${threads}">
                    <span th:text="${thread.gameTitle + ' | 作成者: ' + (thread.ownerDisplayName != null ? thread.ownerDisplayName : thread.ownerUsername) + ' | 投稿: ' + thread.postCount + '件'}"></span>
                    <button type="button" class="secondary"
                            th:attr="data-thread-id=${thread.id},data-thread-title=${thread.gameTitle}">開く</button>
                </li>
            </ul>
        </section>

        <section class="friend-section">
            <h3 id="selectedThreadLabel">スレッドを選択してください</h3>
            <form id="postForm" class="schedule-form">
                <label for="postBody">投稿内容</label>
                <textarea id="postBody" rows="4" maxlength="1000" placeholder="例: 21時から2人募集します" required></textarea>

                <label for="postScheduleDate">予定日（任意）</label>
                <input id="postScheduleDate" type="date">

                <label for="postStartTime">開始時刻（任意）</label>
                <input id="postStartTime" type="time">

                <label for="postRecruitmentLimit">募集人数（任意）</label>
                <input id="postRecruitmentLimit" type="number" min="1" step="1" placeholder="例: 2">

                <div class="form-actions">
                    <button type="submit" class="primary">投稿を送信</button>
                </div>
            </form>
        </section>

        <section class="friend-section">
            <h3>投稿一覧</h3>
            <ul id="postList" class="mini-list"></ul>
        </section>
    </section>
</main>

<script src="/js/theme.js"></script>
<script src="/js/board.js"></script>
</body>
</html>
