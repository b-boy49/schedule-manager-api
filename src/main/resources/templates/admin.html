<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者画面 | ゲーム予定</title>
    <link rel="stylesheet" href="/css/calendar.css">
</head>
<body>
<header class="page-hero">
    <h1>管理者画面</h1>
    <nav class="hero-nav" aria-label="メインメニュー">
        <a href="/calendar" data-nav-badge="calendar" data-nav-label="トップ">トップ</a>
        <a href="/board">募集掲示板</a>
        <a href="/friends" data-nav-badge="friends" data-nav-label="フレンド">フレンド</a>
        <a href="/profile">ユーザー編集</a>
        <a href="/dm" data-nav-badge="dm" data-nav-label="✉ DM">✉ DM</a>
    </nav>
</header>
<form method="post" action="/logout" class="logout-floating">
    <button type="submit">ログアウト</button>
</form>

<main class="app-shell friends-shell">
    <section class="schedule-pane">
        <header>
            <h2>ユーザー別モデレーション</h2>
        </header>

        <section class="friend-section">
            <div class="inline-form">
                <select id="adminTargetUserId" required></select>
                <button id="adminBanButton" type="button" class="secondary">BAN</button>
                <button id="adminUnbanButton" type="button" class="secondary">BAN解除</button>
            </div>
            <form id="adminSearchForm" class="inline-form" style="margin-top:8px;">
                <input id="adminKeyword" type="text" placeholder="本文・ユーザー名・ゲーム名で検索">
                <button type="submit" class="secondary">検索</button>
            </form>
            <p id="adminMessage" class="form-message" aria-live="polite"></p>
        </section>

        <section class="friend-section">
            <h3>通報通知（未対応）</h3>
            <ul id="adminReportList" class="mini-list"></ul>
        </section>

        <section class="friend-section">
            <h3>対象ユーザーの募集投稿</h3>
            <ul id="adminBoardPostList" class="mini-list"></ul>
        </section>

        <section class="friend-section">
            <h3>対象ユーザーの参加希望コメント</h3>
            <ul id="adminBoardInterestList" class="mini-list"></ul>
        </section>

        <section class="friend-section">
            <h3>対象ユーザー関連のDM</h3>
            <ul id="adminDirectMessageList" class="mini-list"></ul>
        </section>
    </section>
</main>

<script src="/js/theme.js"></script>
<script src="/js/nav-badges.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
