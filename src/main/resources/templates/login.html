<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | ゲーム参加型日程</title>
    <link rel="stylesheet" href="/css/calendar.css">
</head>
<body>
<section class="page-hero auth-title-hero">
    <h1>ゲーム参加型日程</h1>
</section>

<main class="app-shell auth-shell auth-single-shell auth-centered-shell">
    <section class="calendar-pane auth-card auth-single-card">
        <h2>ログイン</h2>

        <p class="success-text" th:if="${registered}">新規登録が完了しました。ログインしてください。</p>
        <p class="success-text" th:if="${loggedOut}">ログアウトしました。</p>
        <p class="form-message" th:if="${loginError}">ユーザー名またはパスワードが正しくありません。</p>

        <form method="post" action="/login" class="schedule-form">
            <label for="username">ユーザー名</label>
            <input id="username" name="username" type="text" required>

            <label for="password">パスワード</label>
            <input id="password" name="password" type="password" required>

            <button type="submit" class="primary auth-link-button">ログイン</button>
        </form>

        <a href="/register" class="secondary auth-link-button">新規登録</a>
    </section>
</main>
<script src="/js/theme.js"></script>
</body>
</html>
